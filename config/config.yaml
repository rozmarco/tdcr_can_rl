scene: "assets/cylinders5_links100.xml"
seed: 42
device: "cpu"

env:
  name: "tdcr-v1"
  render: "human"
  num_episodes: 1

buffer:
  max_size: 1000000

agent:
  horizon: 120
  optimizer: 
    _target_: torch.optim.AdamW
    betas: [0.9, 0.999]
    weight_decay: 0.01
  policy_lr: 3e-4
  q_lr: 1e-3
  batch_size: 64
  gamma: 0.99
  tau: 0.005
  alpha: 0.2

model:
  policy:
    d_embedding: 64
    d_hidden: 128
    d_state: 64
    d_latent: 128
    d_ff: 64
    num_layers: 2
    diffusion_steps: 15
    time_embed_type: "learned"
  
  q_network:
    hidden_dim: 64