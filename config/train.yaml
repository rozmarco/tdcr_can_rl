scene: "assets/tdcr_linear_base_5_cyl_real.xml"

epochs: 5         # Number of training sessions
device: "gpu"     # Device to run training on ("cpu" or "cuda" or "mps")
seed: 42          # Random seed for reproducibility

env:
  name: "tdcr-v1"       # Name or ID of the environment
  render: "rgb_array"     # Rendering mode ("rgb_array", "human")
  run_env: True         # Whether to actually run the environment (False = testing)
  num_episodes: 2       # Number of episodes to run (sequentially) per epoch
  max_steps: 100000      # Maximum steps per episode before truncation
  num_workers: 3        # Number of parallel environment workers
  frame_skips: 50
  timestep: 0.002

buffer:
  max_size: 1000000  # Suggestion: max_size > num_episodes * max_steps * num_workers

agent:
  r_dim: 41
  action_dim: 2
  optimizer: 
    _target_: "AdamW"
    betas: [0.9, 0.999]
    weight_decay: 0.01
  policy_lr: 0.0003
  q_lr: 0.001
  batch_size: 64
  gamma: 0.99
  tau: 0.005
  alpha: 0.2
  horizon: 1        # Do not change.
  checkpoint: 1000  # buffer_size / batch_size = iterations

model:
  policy:
    d_embedding: 24
    d_hidden_enc: 48
    d_hidden_dec: 48
    d_state: 8
    d_latent: 16
    num_blocks_enc: 1
    num_blocks_dec: 3
    expand_dec: 2
    diffusion_steps: 20
    max_period: 250.0
    checkpoint: None #./checkpoints/policy_9378_final.pth
  
  q_network:
    d_embedding: 32
    d_hidden: 16
    d_state: 8
    num_blocks: 1
    checkpoint_q1: None #./checkpoints/q1_9378_final.pth
    checkpoint_q2: None #./checkpoints/q2_9378_final.pth