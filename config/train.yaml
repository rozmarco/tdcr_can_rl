scene: "assets/ftdcr_v6_tension.xml"

epochs: 1 # 10
device: "cpu"
seed: 42

env:
  name: "tdcr-v1"
  render: "rgb_array"
  run_env: True # True
  num_episodes: 1
  max_steps: 100 # 30000
  num_workers: 1 # 2
  frame_skips: 50
  timestep: 0.002

buffer:
  max_size: 100000

agent:
  r_dim: 40
  action_dim: 3
  optimizer: 
    _target_: "AdamW"
    betas: [0.9, 0.999]
    weight_decay: 0.01
  policy_lr: 0.0003
  q_lr: 0.001
  batch_size: 32
  gamma: 0.99
  tau: 0.005
  alpha: 0.2
  horizon: 30
  checkpoint: 100 # buffer_size / batch_size = iterations

model:
  policy:
    d_embedding: 16
    d_hidden_enc: 32
    d_state: 8
    d_latent: 16
    num_blocks: 3
    num_blocks_dec: 3
    diffusion_steps: 15
    max_period: 5000.0
  
  q_network:
    d_embedding: 16
    d_hidden: 16
    d_state: 8
    num_blocks: 3